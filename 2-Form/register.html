<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
  </head>
  <body>
    <main>
      <h1>Регистрация</h1>
      <div>Уже есть аккаунт? <a href="#" target="_blank">Войти</a></div>
      <form action="*">
        <div>
          <label for="compname"></label>
          <input
            type="text"
            name="compname"
            id="compname"
            placeholder="Ваша компания"
            required
          />
        </div>
        <div>
          <label for="firstname"></label>
          <input
            type="text"
            name="firstname"
            id="firstname"
            placeholder="Имя"
            required
          />
          <label for="surname"></label>
          <input
            type="text"
            name="surname"
            id="surname"
            placeholder="Фамилия"
            required
          />
        </div>
        <div>
          <label for="email"></label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="E-mail"
            required
          />
        </div>
        <button>Зарегистрироваться</button>
        <div>
          <input type="checkbox" name="agree" id="agree" required />
          <label for="agree"
            >Я прочитал и принимаю
            <a href="*" target="_blank">Условия пользования</a></label
          >
        </div>
      </form>
    </main>
  </body>
</html>
