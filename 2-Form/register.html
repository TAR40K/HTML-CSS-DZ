<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>Регистрация</h1>
      <div class="has-account-container">
        Уже есть аккаунт? <a href="#">Войти</a>
      </div>
      <form action="#">
        <div>
          <input
            type="text"
            name="compname"
            id="compname"
            placeholder="Ваша компания"
            required
            style="
              background-color: #ffffff;
              font-weight: 600;
              font-style: normal;
            "
          />
        </div>
        <div>
          <div class="name">
            <input
              type="text"
              name="firstname"
              id="firstname"
              placeholder="Имя"
              required
            />
            <input
              type="text"
              name="surname"
              id="surname"
              placeholder="Фамилия"
              required
            />
          </div>
        </div>
        <div>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="E-mail"
            required
          />
        </div>
        <button>Зарегистрироваться</button>
        <div>
          <input type="checkbox" name="agree" id="agree" required />
          <label for="agree"
            >Я прочитал и принимаю
            <a href="#" target="_blank">Условия пользования</a></label
          >
        </div>
      </form>
    </main>
  </body>
</html>
