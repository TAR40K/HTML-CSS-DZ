<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/components.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/page.css" />
    <link rel="stylesheet" href="./styles/footer.css" />
    <title>fullFinio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- MARK: HEADER -->
    <header>
      <div class="header-wrapper">
        <img src="./images/logoFinio.svg" alt="Логотип Finio" />
        <ul class="header__ul">
          <li class="ul-item"><a href="#">Возможности</a></li>
          <li class="ul-item"><a href="#">Тарифы</a></li>
          <li class="ul-item"><a href="#">Отзывы</a></li>
          <li class="ul-item"><a href="#">Поддержка клиентов</a></li>
        </ul>
        <button class="button button--white">Личный кабинет</button>
      </div>
    </header>
    <main>
      <!-- MARK: HERO -->
      <section class="hero-section">
        <section class="hero-wrapper">
          <section class="hero__up">
            <section class="hero__left">
              <h1>Простой финансовый учёт для продавцов на маркетплейсах</h1>
              <button class="button button--white">
                Попробовать 14 дней бесплатно
              </button>
              <img
                class="market-places"
                src="./images/logoMarkets.svg"
                alt="Маркетплейсы"
              />
            </section>
            <section class="hero__right">
              <img src="./images/logoHero.svg" alt="Отчёт превью" />
            </section>
          </section>
          <section class="hero__down">
            <div class="hero__down-item">
              <img src="./images/iconPlan.svg" alt="Иконка плана" />
              <p class="item__text">Анализ прибыли по товарам и брендам</p>
            </div>
            <div class="hero__down-item">
              <img src="./images/iconWB.svg" alt="Иконка учёта Wildberries" />
              <p class="item__text">Автоматический учёт доходов Wildberries</p>
            </div>
            <div class="hero__down-item">
              <img src="./images/iconRUB.svg" alt="Иконка цены" />
              <p class="item__text">
                От 990 рублей в месяц с полным функционалом
              </p>
            </div>
          </section>
        </section>
      </section>
      <section class="features-section">
        <section class="features-wrapper">
          <section class="features__item">1</section>
          <section class="features__item">2</section>
          <section class="features__item">3</section>
          <section class="features__item">4</section>
        </section>
      </section>
      <section></section>
      <section></section>
      <section></section>
    </main>
    <footer></footer>
  </body>
</html>
